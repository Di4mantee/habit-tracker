<div id="pin-screen"><div class="pin-box"><div class="pin-title">HABIT TRACKER</div><div class="pin-sub">Entrez votre code PIN</div><div class="pin-dots"><div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div><div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div></div><div class="pin-keypad"><button class="pin-key" onclick="pp(1)">1</button><button class="pin-key" onclick="pp(2)">2</button><button class="pin-key" onclick="pp(3)">3</button><button class="pin-key" onclick="pp(4)">4</button><button class="pin-key" onclick="pp(5)">5</button><button class="pin-key" onclick="pp(6)">6</button><button class="pin-key" onclick="pp(7)">7</button><button class="pin-key" onclick="pp(8)">8</button><button class="pin-key" onclick="pp(9)">9</button><button class="pin-key" onclick="pc()" style="font-size:13px">X</button><button class="pin-key" onclick="pp(0)">0</button><button class="pin-key" onclick="pb()" style="font-size:13px">&lt;</button></div><div class="pin-err" id="pin-err"></div></div></div>

<div id="app" style="display:none;width:100%;"><div style="max-width:860px;margin:0 auto;"><div class="topbar"><span class="sync-indicator sync-offline" id="sync-badge">&#9679; Hors ligne</span><button class="topbar-btn" id="btn-main" onclick="setView(0)">Tracker</button><button class="topbar-btn" id="btn-history" onclick="setView(1)">Historique</button><button class="topbar-btn" id="btn-summary" onclick="setView(2)">Bilan mensuel</button><button class="topbar-btn" id="btn-dark" onclick="toggleDark()">Mode sombre</button><button class="topbar-btn" onclick="lockApp()">Verrouiller</button></div><div class="wrap"><div id="month-nav-el"></div><div id="week-tabs-el"></div><div id="view-area"></div></div></div></div>
<script>
var PIN="7546",SK="ht_ok",pv="",_db=null,_docRef=null,_fbUnsub=null;
function setSyncBadge(s){var b=document.getElementById("sync-badge");if(!b)return;if(s==="ok"){b.className="sync-indicator sync-ok";b.innerHTML="&#9679; Synchronise";}else if(s==="pending"){b.className="sync-indicator sync-pending";b.innerHTML="&#9679; Sync...";}else{b.className="sync-indicator sync-offline";b.innerHTML="&#9679; Hors ligne";}}
function fbInit(){try{var cfg={apiKey:"AIzaSyDIYkQUFwMzgKiJ1-Jjn3eYQgFrfyhh9wc",authDomain:"habit-tracker-1212a.firebaseapp.com",projectId:"habit-tracker-1212a",storageBucket:"habit-tracker-1212a.firebasestorage.app",messagingSenderId:"599765273383",appId:"1:599765273383:web:79c6b9bb5630ffe32c3702"};if(!firebase.apps.length)firebase.initializeApp(cfg);_db=firebase.firestore();_docRef=_db.collection("tracker").doc("main");setSyncBadge("pending");_docRef.get().then(function(snap){if(snap.exists){var r=snap.data();_yr=r.yr;_mo=r.mo!=null?r.mo:_mo;_wk=r.wk||0;_data=r.data||_data;_C=r.C||{};_dark=r.dark||false;for(var i=0;i<_data.length;i++)for(var j=0;j<_data[i].habits.length;j++)if(!_data[i].habits[j].days)_data[i].habits[j].days=[0,1,2,3,4,5,6];localStorage.setItem("ht4",JSON.stringify({yr:_yr,mo:_mo,wk:_wk,data:_data,C:_C,dark:_dark}));}else{var loc=localStorage.getItem("ht4");if(loc)_docRef.set(JSON.parse(loc));}setSyncBadge("ok");fbListen();if(sessionStorage.getItem(SK)==="1"){document.getElementById("pin-screen").style.display="none";document.getElementById("app").style.display="block";if(_dark)document.body.classList.add("dark");render();}}).catch(function(e){console.error("fb get",e);setSyncBadge("offline");if(sessionStorage.getItem(SK)==="1"){document.getElementById("pin-screen").style.display="none";document.getElementById("app").style.display="block";render();}});}catch(e){console.error("fb init",e);setSyncBadge("offline");}}
function fbListen(){if(_fbUnsub)_fbUnsub();_fbUnsub=_docRef.onSnapshot(function(snap){if(!snap.exists)return;var r=snap.data();var cur=JSON.stringify({yr:_yr,mo:_mo,wk:_wk,data:_data,C:_C,dark:_dark});if(JSON.stringify(r)===cur)return;_yr=r.yr;_mo=r.mo!=null?r.mo:_mo;_wk=r.wk||0;_data=r.data||_data;_C=r.C||{};_dark=r.dark||false;for(var i=0;i<_data.length;i++)for(var j=0;j<_data[i].habits.length;j++)if(!_data[i].habits[j].days)_data[i].habits[j].days=[0,1,2,3,4,5,6];localStorage.setItem("ht4",JSON.stringify({yr:_yr,mo:_mo,wk:_wk,data:_data,C:_C,dark:_dark}));if(document.getElementById("app").style.display!=="none"){if(_dark)document.body.classList.add("dark");else document.body.classList.remove("dark");render();}setSyncBadge("ok");},function(e){console.error("fb listen",e);setSyncBadge("offline");});}
function fbSave(){if(!_docRef){setSyncBadge("offline");return;}setSyncBadge("pending");_docRef.set({yr:_yr,mo:_mo,wk:_wk,data:_data,C:_C,dark:_dark}).then(function(){setSyncBadge("ok");}).catch(function(e){console.error("fb save",e);setSyncBadge("offline");}); }
function pp(n){if(pv.length>=4)return;pv+=String(n);ud();if(pv.length===4)setTimeout(cp,150);}
function pb(){pv=pv.slice(0,-1);ud();document.getElementById("pin-err").textContent="";}
function pc(){pv="";ud();document.getElementById("pin-err").textContent="";}
function ud(){for(var i=0;i<4;i++){var d=document.getElementById("dot"+i);if(i<pv.length)d.classList.add("filled");else d.classList.remove("filled");}}
function cp(){if(pv===PIN){sessionStorage.setItem(SK,"1");document.getElementById("pin-screen").style.display="none";document.getElementById("app").style.display="block";if(_dark)document.body.classList.add("dark");render();}else{document.getElementById("pin-err").textContent="Code incorrect";pv="";ud();}}

document.addEventListener("keydown",function(e){if(document.getElementById("pin-screen").style.display!=="none"){if(e.key>="0"&&e.key<="9")pp(parseInt(e.key));else if(e.key==="Backspace")pb();else if(e.key==="Escape")pc();}});
var MIDS=["days-modal","add-habit-modal","add-cat-modal","rename-modal"];

var editCi=-1,editHi=-1,tmpDays=[],addToCi=-1,newHabDays=[],renameCi=-1,renameHi=-1,renameType="";
function openDaysModal(ci,hi){editCi=ci;editHi=hi;var h=_data[ci].habits[hi];tmpDays=h.days?h.days.slice():[0,1,2,3,4,5,6];document.getElementById("days-modal-title").textContent=h.name+" - jours actifs";buildDG("days-grid",tmpDays,function(arr){tmpDays=arr;});openModal("days-modal");}
function buildDG(gid,activeDays,onChange){var g=document.getElementById(gid);g.innerHTML="";var cur=activeDays.slice();for(var d=0;d<7;d++){var b=document.createElement("button");b.className="dt"+(cur.indexOf(d)>=0?" on":"");b.textContent=DN[d];b.setAttribute("data-d",d);b.onclick=(function(btn,day){return function(){var pos=cur.indexOf(day);if(pos>=0){cur.splice(pos,1);btn.classList.remove("on");}else{cur.push(day);btn.classList.add("on");}onChange(cur);};})(b,d);g.appendChild(b);}}
function saveDays(){if(editCi>=0&&editHi>=0){_data[editCi].habits[editHi].days=tmpDays.slice().sort(function(a,b){return a-b;});saveState();render();}closeModal(0);}
function openAddHabit(ci){addToCi=ci;newHabDays=[0,1,2,3,4,5,6];document.getElementById("new-habit-name").value="";buildDG("new-habit-days",newHabDays,function(arr){newHabDays=arr;});openModal("add-habit-modal");setTimeout(function(){document.getElementById("new-habit-name").focus();},100);}
function confirmAddHabit(){var name=document.getElementById("new-habit-name").value.trim();if(!name)return;_data[addToCi].habits.push({name:name,days:newHabDays.slice().sort(function(a,b){return a-b;})});saveState();render();closeModal(1);}

function wkIndex(yr,mo,wk){return yr*10000+mo*100+wk;}
function isHabVisible(hab,vYr,vMo,vWk){if(!hab.deletedAt)return true;return wkIndex(vYr,vMo,vWk)<wkIndex(hab.deletedAt.yr,hab.deletedAt.mo,hab.deletedAt.wk);}
