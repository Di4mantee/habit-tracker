<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:h#e8ecf8;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
.container{width:960px;background:white;border-radius:14px;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.18);}
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;background:#7b8ec8;padding:14px 20px;}
.month-nav button{background:rgba(255,255,255,.2);border:none;color:white;font-size:22px;cursor:pointer;font-weight:bold;border-radius:6px;padding:2px 12px;}
.month-nav button:hover{background:rgba(255,255,255,.35);}
.month-label{color:white;font-size:26px;font-weight:900;letter-spacing:3px;min-width:260px;text-align:center;}
.weeks-tabs{display:flex;background:#d8dff5;border-bottom:2px solid #b5bce8;}
.week-tab{flex:1;text-align:center;padding:11px;cursor:pointer;font-weight:600;font-size:13px;border-right:1px solid #b5bce8;}
.week-tab:last-child{border-right:none;}
.week-tab.active{background:#7b8ec8;color:white;}
.week-tab:not(.active){background:#a0aad4;color:#f0f2ff;}
.week-tab:not(.active):hover{background:#8f9dc9;}
.week-header{display:grid;grid-template-columns:220px repeat(7,1fr);background:#eef0f8;border-bottom:1px solid #d0d5ea;padding:8px 0;}
.day-name{text-align:center;font-size:12px;font-weight:700;color:#7b8ec8;text-transform:uppercase;}
.habit-row{display:grid;grid-template-columns:220px repeat(7,1fr);border-bottom:1px solid #eee;align-items:center;}
.habit-row:last-child{border-bottom:none;}
.habit-name{padding:10px 16px;font-size:14px;font-weight:600;color:#333;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.habit-name:hover .edit-icon{opacity:1;}
.edit-icon{opacity:0;font-size:11px;color:#aaa;transition:opacity .15s;margin-left:auto;}
.habit-icon{font-size:18px;flex-shrink:0;}
.day-cell{display:flex;align-items:center;justify-content:center;padding:8px;}
.check-btn{width:28px;height:28px;border-radius:50%;border:2px solid #b5bce8;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-btn.done{background:#7b8ec8;border-color:#7b8ec8;color:white;}
.check-btn:hover:not(.inactive){border-color:#7b8ec8;}
.check-btn.inactive{background:#f0f0f0;border-color:#e0e0e0;cursor:default;opacity:0.3;}
.stats-row{display:grid;grid-template-columns:220px 1fr;border-bottom:1px solid #eee;background:#fafbff;}
.stats-label{padding:8px 16px;font-size:12px;color:#999;font-weight:600;}
.stats-bar-wrap{padding:8px 12px;display:flex;align-items:center;gap:10px;}
.stats-bar{flex:1;height:8px;background:#e8ecf8;border-radius:4px;overflow:hidden;}
.stats-fill{height:100%;background:#7b8ec8;border-radius:4px;}
.stats-pct{font-size:12px;color:#7b8ec8;font-weight:700;min-width:40px;}
.summary-section{padding:20px;background:#f8f9fd;border-top:2px solid #e0e4f0;}
.summary-title{font-size:14px;font-weight:700;color:#7b8ec8;margin-bottom:12px;text-transform:uppercase;letter-spacing:2px;}
.donuts{display:flex;gap:16px;flex-wrap:wrap;}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.donut-label{font-size:11px;color:#666;font-weight:600;text-align:center;max-width:70px;}
#pin-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.pin-box{background:white;border-radius:20px;padding:40px 50px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);min-width:320px;}
.pin-title{font-size:22px;font-weight:900;color:#7b8ec8;margin-bottom:8px;letter-spacing:2px;}
.pin-subtitle{font-size:13px;color:#999;margin-bottom:28px;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #b5bce8;background:white;transition:all .2s;}
.pin-dot.filled{background:#7b8ec8;border-color:#7b8ec8;}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto;}
.pin-key{padding:14px;font-size:20px;font-weight:700;border:2px solid #e0e4f0;border-radius:12px;background:white;cursor:pointer;color:#444;transition:all .15s;}
.pin-key:hover{background:#f0f3ff;border-color:#7b8ec8;color:#7b8ec8;}
.pin-key:active{background:#7b8ec8;color:white;}
.pin-error{color:#e74c3c;font-size:13px;margin-top:12px;min-height:20px;}
#days-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:8888;}
#days-modal.open{display:flex;}
.days-box{background:white;border-radius:16px;padding:30px;min-width:340px;box-shadow:0 10px 40px rgba(0,0,0,0.2);}
.days-box h3{font-size:16px;font-weight:800;color:#333;margin-bottom:6px;}
.days-subtitle{font-size:12px;color:#999;margin-bottom:20px;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px;}
.day-toggle{padding:8px 4px;text-align:center;border-radius:10px;border:2px solid #e0e4f0;cursor:pointer;font-size:12px;font-weight:700;color:#aaa;background:white;transition:all .15s;}
.day-toggle.on{background:#7b8ec8;border-color:#7b8ec8;color:white;}
.day-toggle:hover{border-color:#7b8ec8;}
.days-actions{display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:8px 18px;border:2px solid #e0e4f0;border-radius:8px;background:white;cursor:pointer;font-size:13px;font-weight:600;color:#666;}
.btn-save{padding:8px 18px;border:none;border-radius:8px;background:#7b8ec8;cursor:pointer;font-size:13px;font-weight:600;color:white;}
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-title">HABIT TRACKER</div>
    <div class="pin-subtitle">Entrez votre code PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinPress(1)">1</button>
      <button class="pin-key" onclick="pinPress(2)">2</button>
      <button class="pin-key" onclick="pinPress(3)">3</button>
      <button class="pin-key" onclick="pinPress(4)">4</button>
      <button class="pin-key" onclick="pinPress(5)">5</button>
      <button class="pin-key" onclick="pinPress(6)">6</button>
      <button class="pin-key" onclick="pinPress(7)">7</button>
      <button class="pin-key" onclick="pinPress(8)">8</button>
      <button class="pin-key" onclick="pinPress(9)">9</button>
      <button class="pin-key" onclick="pinClear()" style="font-size:14px">x</button>
      <button class="pin-key" onclick="pinPress(0)">0</button>
      <button class="pin-key" onclick="pinBack()" style="font-size:14px">&lt;</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div id="days-modal">
  <div class="days-box">
    <h3 id="modal-title">Jours actifs</h3>
    <div class="days-subtitle">Selectionne les jours actifs pour cette habitude</div>
    <div class="days-grid" id="days-grid"></div>
    <div class="days-actions">
      <button class="btn-cancel" onclick="closeDaysModal()">Annuler</button>
      <button class="btn-save" onclick="saveDays()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="app" style="display:none;width:100%;align-items:center;flex-direction:column;">
  <div style="width:960px;padding:10px 0;text-align:right;font-size:12px;color:#aaa;">
    <span onclick="lockApp()" style="cursor:pointer;padding:4px 10px;border-radius:6px;background:#eee;">Verrouiller</span>
  </div>
  <div class="container" id="main-container"></div>
</div>

<script>
// --- PIN ---
var PIN = '7546';
var SKEY = 'ht_ok';
var pinVal = '';

function pinPress(n) {
  if (pinVal.length >= 4) return;
  pinVal += String(n);
  updDots();
  if (pinVal.length === 4) setTimeout(checkPin, 150);
}
function pinBack() { pinVal = pinVal.slice(0,-1); updDots(); document.getElementById('pin-error').textContent=''; }
function pinClear() { pinVal=''; updDots(); document.getElementById('pin-error').textContent=''; }
function updDots() {
  for (var i=0;i<4;i++) {
    var d=document.getElementById('dot'+i);
    if (i<pinVal.length) d.classList.add('filled'); else d.classList.remove('filled');
  }
}
function checkPin() {
  if (pinVal===PIN) {
    sessionStorage.setItem(SKEY,'1');
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    render();
  } else {
    document.getElementById('pin-error').textContent='Code incorrect';
    pinVal=''; updDots();
  }
}
function lockApp() {
  sessionStorage.removeItem(SKEY);
  document.getElementById('app').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
  pinVal=''; updDots(); document.getElementById('pin-error').textContent='';
}
if (sessionStorage.getItem(SKEY)==='1') {
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='flex';
}
document.addEventListener('keydown',function(e){
  if (document.getElementById('pin-screen').style.display!=='none') {
    if (e.key>='0'&&e.key<='9') pinPress(parseInt(e.key));
    else if (e.key==='Backspace') pinBack();
    else if (e.key==='Escape') pinClear();
  }
});

// --- DAYS MODAL ---
var DN=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
var editIdx=-1, tmpDays=[];

function openDaysModal(idx) {
  editIdx=idx;
  var h=_data[idx];
  tmpDays=(h.days?h.days.slice():[0,1,2,3,4,5,6]);
  document.getElementById('modal-title').textContent=h.n+' - jours actifs';
  var g=document.getElementById('days-grid');
  g.innerHTML='';
  for (var d=0;d<7;d++) {
    var b=document.createElement('button');
    b.className='day-toggle'+(tmpDays.indexOf(d)>=0?' on':'');
    b.textContent=DN[d];
    b.setAttribute('data-d',d);
    b.onclick=function() {
      var day=parseInt(this.getAttribute('data-d'));
      var pos=tmpDays.indexOf(day);
      if(pos>=0){tmpDays.splice(pos,1);this.classList.remove('on');}
      else{tmpDays.push(day);this.classList.add('on');}
    };
    g.appendChild(b);
  }
  document.getElementById('days-modal').classList.add('open');
}
function closeDaysModal() {
  document.getElementById('days-modal').classList.remove('open');
  editIdx=-1;
}
function saveDays() {
  if(editIdx>=0) {
    _data[editIdx].days=tmpDays.slice().sort(function(a,b){return a-b;});
    saveState(); render();
  }
  closeDaysModal();
}
document.getElementById('days-modal').addEventListener('click',function(e){if(e.target===this)closeDaysModal();});

// --- TRACKER ---
var MN=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
var _yr,_mo,_wk,_data,_C;

function loadState() {
  var s=localStorage.getItem('ht2');
  if(s) {
    var o=JSON.parse(s);
    _yr=o.yr||new Date().getFullYear();
    _mo=o.mo!=null?o.mo:new Date().getMonth();
    _wk=o.wk||0; _data=o.data||defHabits(); _C=o.C||{};
  } else {
    var n=new Date(); _yr=n.getFullYear(); _mo=n.getMonth(); _wk=0; _data=defHabits(); _C={};
  }
  for(var i=0;i<_data.length;i++) if(!_data[i].days) _data[i].days=[0,1,2,3,4,5,6];
}
function saveState() { localStorage.setItem('ht2',JSON.stringify({yr:_yr,mo:_mo,wk:_wk,data:_data,C:_C})); }
function defHabits() {
  return [{n:'Meditation',i:'Meditation',days:[0,1,2,3,4,5,6]},{n:'Sport',i:'Sport',days:[0,2,4]},
          {n:'Lecture',i:'Lecture',days:[0,1,2,3,4,5,6]},{n:'Eau 2L',i:'Eau',days:[0,1,2,3,4,5,6]},
          {n:'Sommeil 8h',i:'Sommeil',days:[0,1,2,3,4,5,6]}];
}
function getWeeks(yr,mo) {
  var wks=[],d=new Date(yr,mo,1),dow=d.getDay();
  var off=(dow===0)?-6:1-dow;
  var st=new Date(d); st.setDate(st.getDate()+off);
  for(var w=0;w<6;w++){
    var days=[],ws=new Date(st); ws.setDate(ws.getDate()+w*7);
    for(var d2=0;d2<7;d2++){var dy=new Date(ws);dy.setDate(dy.getDate()+d2);days.push(dy);}
    if(days.some(function(x){return x.getMonth()===mo;})) wks.push(days);
  }
  return wks;
}
function ck(yr,mo,wk,hab,di){return yr+'-'+mo+'-'+wk+'-'+hab+'-'+di;}
function changeMonth(d){
  _mo+=d; if(_mo>11){_mo=0;_yr++;} if(_mo<0){_mo=11;_yr--;}
  _wk=0; saveState(); render();
}
function selWeek(w){_wk=w;saveState();render();}

function drawDonut(cv,pct){
  var ctx=cv.getContext('2d'),cx=cv.width/2,cy=cv.height/2,r=cx-5;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#e8ecf0';ctx.lineWidth=6;ctx.stroke();
  if(pct>0){ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.strokeStyle='#7b8ec8';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();}
  ctx.fillStyle='#555';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(Math.round(pct*100)+'%',cx,cy);
}

function render() {
  var mc=document.getElementById('main-container');
  if(!mc) return;
  var weeks=getWeeks(_yr,_mo);
  if(_wk>=weeks.length) _wk=0;
  var cw=weeks[_wk];
  var h='';

  // Month nav
  h+='<div class="month-nav">';
  h+='<button onclick="changeMonth(-1)">&lsaquo;</button>';
  h+='<div class="month-label">'+MN[_mo]+' '+_yr+'</div>';
  h+='<button onclick="changeMonth(1)">&rsaquo;</button>';
  h+='</div>';

  // Week tabs
  h+='<div class="weeks-tabs">';
  for(var wt=0;wt<weeks.length;wt++){
    var wkd=weeks[wt];
    var ac=wt===_wk?' active':'';
    var sd=wkd[0].getDate()+'/'+(wkd[0].getMonth()+1);
    var ed=wkd[6].getDate()+'/'+(wkd[6].getMonth()+1);
    h+='<div class="week-tab'+ac+'" data-wt="'+wt+'" id="wt'+wt+'">S'+(wt+1)+'<br><small>'+sd+'-'+ed+'</small></div>';
  }
  h+='</div>';

  // Day header
  h+='<div class="week-header"><div></div>';
  for(var di=0;di<7;di++){
    var dd=cw[di];
    h+='<div class="day-name" style="color:'+(dd.getMonth()===_mo?'#7b8ec8':'#bbb')+'">'+DN[di]+'<br>'+dd.getDate()+'</div>';
  }
  h+='</div>';

  // Habits
  for(var hi=0;hi<_data.length;hi++){
    var hab=_data[hi];
    var ad=hab.days||[0,1,2,3,4,5,6];
    var dl=ad.length===7?'Tous les jours':ad.map(function(x){return DN[x];}).join(', ');
    h+='<div class="habit-row">';
    h+='<div class="habit-name" data-hi="'+hi+'" id="hn'+hi+'">';
    h+='<span class="habit-icon">'+hab.i+'</span>';
    h+='<span>'+hab.n+'<br><span style="font-size:10px;color:#aaa;font-weight:400;">'+dl+'</span></span>';
    h+='<span class="edit-icon">&#9998;</span></div>';
    for(var di2=0;di2<7;di2++){
      var isA=ad.indexOf(di2)>=0;
      var k=ck(_yr,_mo,_wk,hab.n,di2);
      var done=_C[k]?true:false;
      var cls='check-btn'+(done?' done':'')+(isA?'':' inactive');
      h+='<div class="day-cell"><button class="'+cls+'" data-hi="'+hi+'" data-di="'+di2+'" data-active="'+(isA?1:0)+'" id="cb'+hi+'x'+di2+'">'+(done?'&#10003;':'')+'</button></div>';
    }
    h+='</div>';
  }

  // Stats
  h+='<div style="background:#f5f7ff;border-top:2px solid #e0e4f0;padding:10px 0;">';
  for(var hi2=0;hi2<_data.length;hi2++){
    var hab2=_data[hi2],ad2=hab2.days||[0,1,2,3,4,5,6],dn2=0;
    for(var x=0;x<ad2.length;x++) if(_C[ck(_yr,_mo,_wk,hab2.n,ad2[x])]) dn2++;
    var tot2=ad2.length, pct2=tot2>0?dn2/tot2:0;
    h+='<div class="stats-row"><div class="stats-label">'+hab2.n+'</div>';
    h+='<div class="stats-bar-wrap"><div class="stats-bar"><div class="stats-fill" style="width:'+Math.round(pct2*100)+'%"></div></div>';
    h+='<div class="stats-pct">'+dn2+'/'+tot2+'</div></div></div>';
  }
  h+='</div>';

  // Monthly donuts
  h+='<div class="summary-section"><div class="summary-title">Resume du mois</div><div class="donuts">';
  for(var hi3=0;hi3<_data.length;hi3++){
    var hab3=_data[hi3],ad3=hab3.days||[0,1,2,3,4,5,6],dc3=0,td3=0;
    for(var wk2=0;wk2<weeks.length;wk2++){
      for(var di4=0;di4<7;di4++){
        if(weeks[wk2][di4].getMonth()===_mo&&ad3.indexOf(di4)>=0){td3++;if(_C[ck(_yr,_mo,wk2,hab3.n,di4)])dc3++;}
      }
    }
    var p3=td3>0?dc3/td3:0;
    h+='<div class="donut-wrap"><canvas id="dn'+hi3+'" width="70" height="70"></canvas><div class="donut-label">'+hab3.n+'</div></div>';
  }
  h+='</div></div>';

  mc.innerHTML=h;

  // Attach events using data-attributes (no inline quotes issue)
  var wTabs=mc.querySelectorAll('.week-tab');
  for(var i=0;i<wTabs.length;i++){
    wTabs[i].addEventListener('click',function(){selWeek(parseInt(this.getAttribute('data-wt')));});
  }
  var hNames=mc.querySelectorAll('.habit-name');
  for(var i2=0;i2<hNames.length;i2++){
    hNames[i2].addEventListener('click',function(){openDaysModal(parseInt(this.getAttribute('data-hi')));});
  }
  var btns=mc.querySelectorAll('.check-btn');
  for(var i3=0;i3<btns.length;i3++){
    btns[i3].addEventListener('click',function(){
      if(this.getAttribute('data-active')==='0') return;
      var hi4=parseInt(this.getAttribute('data-hi'));
      var di5=parseInt(this.getAttribute('data-di'));
      var k2=ck(_yr,_mo,_wk,_data[hi4].n,di5);
      if(_C[k2]) delete _C[k2]; else _C[k2]=1;
      saveState(); render();
    });
  }

  // Draw donuts
  for(var hi5=0;hi5<_data.length;hi5++){
    var hab5=_data[hi5],ad5=hab5.days||[0,1,2,3,4,5,6],dc5=0,td5=0;
    for(var wk3=0;wk3<weeks.length;wk3++){
      for(var di6=0;di6<7;di6++){
        if(weeks[wk3][di6].getMonth()===_mo&&ad5.indexOf(di6)>=0){td5++;if(_C[ck(_yr,_mo,wk3,hab5.n,di6)])dc5++;}
      }
    }
    var cv=document.getElementById('dn'+hi5);
    if(cv) drawDonut(cv,td5>0?dc5/td5:0);
  }
}

loadState();
if(sessionStorage.getItem(SKEY)==='1') render();
</script>
</body>
</html>
